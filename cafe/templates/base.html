{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>FFC Cafe</title>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

    <div class="container">

        <a class="navbar-brand" href="#">
            FFC Cafe
        </a>

        <div class="ms-auto d-flex align-items-center gap-2">

            <a href="{% url 'menu' %}" class="btn btn-light">
                Menu
            </a>

            <a href="{% url 'cart' %}" class="btn btn-warning position-relative">

                Cart

                <span id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"

                    {% if cart_count == 0 %}
                    style="display:none;"
                    {% endif %}>

                    {{ cart_count }}

                </span>
            </a>

            <a href="{% url 'order_history' %}" class="btn btn-info">
                Orders
            </a>

           {% if request.user.is_authenticated %}

            <span class="text-white fw-bold">
                {{ request.user.username }}
            </span>

            <a href="{% url 'logout' %}" class="btn btn-danger">
                Logout
            </a>

           {% else %}

            <a href="{% url 'login' %}" class="btn btn-success">
                Login
            </a>

            <a href="{% url 'signup' %}" class="btn btn-primary">
                Signup
            </a>

             {% endif %}
            
        </div>

    </div>

</nav>

<div class="container mt-5 pt-5">

    {% block content %}
    {% endblock %}

</div>
<script src="{% static 'javascript/main.js' %}"></script>
</body>
</html>
